<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>CISA B2B Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; }
        .app-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 900px; display: none; margin: 20px; }
        .logo-img { width: 180px; height: auto; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn { background: #1a3a5f; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .section { border: 1px solid #eee; padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
        .total { font-size: 1.5em; font-weight: bold; color: #1a3a5f; text-align: right; margin-top: 15px; }
        #status { color: #d35400; font-weight: bold; margin-bottom: 10px; font-size: 0.8em; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loginScreen" class="login-card">
    <img src="CISA logo.JPG" alt="CISA Logo" class="logo-img" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/b/b3/Cisa_logo.svg'">
    <h3>B2B Login</h3>
    <input type="text" id="codeInput" placeholder="Klijentski kod">
    <input type="password" id="passInput" placeholder="Lozinka">
    <button class="btn" onclick="checkLogin()">PRIJAVI SE</button>
    <p id="loginError" style="color: red; display: none; margin-top: 10px;">Pogrešni podaci!</p>
</div>

<div id="appScreen" class="app-container">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
        <div>
            <img src="logo.png" alt="Logo" style="height: 30px; vertical-align: middle;" onerror="this.style.display='none'">
            <strong id="welcomeMsg" style="margin-left: 10px; color: #1a3a5f;"></strong>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:#d35400; cursor:pointer; font-weight:bold;">Odjava</button>
    </div>
    
    <div id="status">Povezivanje sa bazom...</div>

    <div class="grid">
        <div class="section">
            <label>Pretraga artikla:</label>
            <input type="text" id="itemSearch" placeholder="Šifra ili naziv..." oninput="filterItems()">
            <select id="itemList" size="10" onchange="calculate()"></select>
        </div>
        <div class="section">
            <p>Bruto: <strong id="outGross">0.00</strong> €</p>
            <p>Rabati: <span id="outR1">0</span>% + <span id="outR2">0</span>%</p>
            <label>Količina:</label>
            <input type="number" id="qty" value="1" min="1" oninput="calculate()">
            <h2 style="color: #27ae60;">Neto: <span id="outNet">0.00</span> €</h2>
            <button class="btn" style="background:#27ae60;" onclick="addToCart()">DODAJ NA PONUDU</button>
        </div>
    </div>

    <table id="cartTable">
        <thead>
            <tr><th>Šifra</th><th>Opis</th><th>Kol.</th><th>Neto</th><th>Ukupno</th><th></th></tr>
        </thead>
        <tbody></tbody>
    </table>
    <div class="total">UKUPNO: <span id="cartTotal">0.00</span> €</div>
</div>

<script>
    let dbPrice = [], dbDisc = {}, dbClients = [], cart = [], currentUser = null;

    async function init() {
        try {
            const res = await fetch('baza.xlsx');
            if (!res.ok) throw new Error();
            const data = await res.arrayBuffer();
            const wb = XLSX.read(data, { type: 'array' });

            dbClients = XLSX.utils.sheet_to_json(wb.Sheets["Clients"]);
            dbPrice = XLSX.utils.sheet_to_json(wb.Sheets["PriceLIstEUR39"]);
            
            const discData = XLSX.utils.sheet_to_json(wb.Sheets["Discounts"]);
            discData.forEach(d => {
                dbDisc[`${d.CLIENT_CODE}-${d.FAMILY}`] = { r1: d.BASIC_DISCOUNT, r2: d.DISCOUNT_2 };
            });

            document.getElementById('status').innerText = "✅ Baza spremna.";
        } catch (e) {
            document.getElementById('status').innerText = "❌ Greška: baza.xlsx nije pronađena!";
        }
    }

    function checkLogin() {
        const code = document.getElementById('codeInput').value.trim();
        const pass = document.getElementById('passInput').value.trim();
        
        // Tražimo klijenta po kodu i lozinki
        const user = dbClients.find(c => 
            c.CLIENT_CODE.toString() === code && 
            (c.PASSWORD ? c.PASSWORD.toString() === pass : c.CLIENT_CODE.toString() === pass)
        );

        if (user) {
            currentUser = user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            document.getElementById('welcomeMsg').innerText = user.CLIENT_NAME;
            filterItems();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function filterItems() {
        const term = document.getElementById('itemSearch').value.toLowerCase();
        const filtered = dbPrice.filter(i => 
            (i.CODE && i.CODE.toString().toLowerCase().includes(term)) || 
            (i.DESCRIPTION && i.DESCRIPTION.toString().toLowerCase().includes(term))
        ).slice(0, 50);
        
        document.getElementById('itemList').innerHTML = filtered.map(i => 
            `<option value="${i.CODE}" data-price="${i['GROSS PRICE']}" data-family="${i.FAMILY}" data-desc="${i.DESCRIPTION}">${i.CODE} - ${i.DESCRIPTION}</option>`).join('');
    }

    function calculate() {
        const itemSel = document.getElementById('itemList');
        if (itemSel.selectedIndex === -1) return;
        const opt = itemSel.options[itemSel.selectedIndex];
        const gross = parseFloat(opt.getAttribute('data-price')) || 0;
        const family = opt.getAttribute('data-family');
        
        // Povlačenje rabata za ulogovanog korisnika
        const disc = dbDisc[`${currentUser.CLIENT_CODE}-${family}`] || { r1: 50, r2: 0 };
        const net = gross * (1 - disc.r1/100) * (1 - disc.r2/100);

        document.getElementById('outGross').innerText = gross.toFixed(2);
        document.getElementById('outR1').innerText = disc.r1;
        document.getElementById('outR2').innerText = disc.r2;
        document.getElementById('outNet').innerText = net.toFixed(2);
        return { code: opt.value, desc: opt.getAttribute('data-desc'), net };
    }

    function addToCart() {
        const res = calculate();
        const qty = parseInt(document.getElementById('qty').value) || 1;
        if(!res) return;
        cart.push({ ...res, qty, total: res.net * qty });
        renderCart();
    }

    function renderCart() {
        const tbody = document.querySelector('#cartTable tbody');
        tbody.innerHTML = cart.map((i, idx) => 
            `<tr><td>${i.code}</td><td>${i.desc}</td><td>${i.qty}</td><td>${i.net.toFixed(2)}</td><td>${i.total.toFixed(2)}</td><td style="color:red; cursor:pointer" onclick="cart.splice(${idx},1);renderCart()">❌</td></tr>`).join('');
        document.getElementById('cartTotal').innerText = cart.reduce((s, i) => s + i.total, 0).toFixed(2);
    }

    window.onload = init;
</script>
</body>
</html>
