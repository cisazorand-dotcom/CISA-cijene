<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CISA B2B Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --p: #1a3a5f; --s: #27ae60; --bg: #f4f7f9; --accent: #e67e22; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; }
        .login-page { height: 100vh; display: flex; align-items: center; justify-content: center; width: 100%; }
        .box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 380px; text-align: center; }
        .by-zoran { font-size: 12px; color: #888; margin-top: -10px; margin-bottom: 20px; font-style: italic; letter-spacing: 1px; }
        #app { display: none; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
        
        .search-container { position: relative; width: 100%; margin-top: 10px; }
        .search-container input { padding-right: 40px; }
        .clear-btn { 
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: #eee; color: #666; border: none; border-radius: 50%;
            width: 24px; height: 24px; cursor: pointer; font-weight: bold;
            display: none; align-items: center; justify-content: center; font-size: 12px;
        }

        .qty-btn { background: #eee; border: none; width: 25px; height: 25px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .qty-btn:hover { background: #ddd; }
        
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        .btn { border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; font-size: 16px; transition: 0.3s; color: white; }
        .btn-p { background: var(--p); }
        .btn-s { background: var(--s); }
        .btn-a { background: var(--accent); }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .lang-switch { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .lang-btn { padding: 6px 15px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; background: #f8f9fa; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .lang-btn.active { background: var(--p); color: white; border-color: var(--p); }
        .item-list { height: 400px; overflow-y: auto; border: 1px solid #eee; margin-top: 15px; border-radius: 8px; }
        .row { padding: 15px; border-bottom: 1px solid #f1f1f1; cursor: pointer; text-align: left; }
        .row:hover { background: #f0f7ff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th { background: #f8f9fa; color: var(--p); text-align: left; padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .total-area { text-align: right; font-size: 28px; font-weight: bold; color: var(--p); padding: 25px 0; }
        .logo-img { width: 160px; margin-bottom: 15px; }
        @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-page" class="login-page">
        <div class="box">
            <img src="CISA logo.JPG" id="pdfLogoSource" class="logo-img" alt="CISA Logo">
            <div class="by-zoran">B2B Portal by Zoran</div>
            <div class="lang-switch">
                <div class="lang-btn active" id="btn-sr" onclick="setLang('sr')">EX_YU</div>
                <div class="lang-btn" id="btn-en" onclick="setLang('en')">ENG</div>
                <div class="lang-btn" id="btn-it" onclick="setLang('it')">ITA</div>
            </div>
            <h3 id="t-welcome" style="color:var(--p); margin-top:0;"></h3>
            <div id="status">Učitavanje...</div>
            <div id="login-form" style="display:none;">
                <input type="text" id="uCode">
                <input type="password" id="uPass" onkeyup="if(event.key==='Enter') login()">
                <button class="btn btn-p" id="t-loginBtn" onclick="login()"></button>
                <p id="err" style="color:red; display:none; margin-top:15px; font-size:14px;"></p>
            </div>
        </div>
    </div>

    <div id="app">
        <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left: 5px solid var(--p);">
            <div><span id="t-loggedAs"></span> <strong id="userDisplay" style="color:var(--p);"></strong></div>
            <button onclick="logout()" id="t-logout" style="background:none; border:none; color:#c0392b; cursor:pointer; font-weight:bold; font-size:14px;"></button>
        </div>

        <div class="grid">
            <div class="card">
                <h3 id="t-searchTitle"></h3>
                <div class="search-container">
                    <input type="text" id="search" oninput="srch()">
                    <button id="clearSearch" class="clear-btn" onclick="clearInput()">✕</button>
                </div>
                <div id="list" class="item-list"></div>
            </div>

            <div class="card">
                <h3 id="t-calcTitle"></h3>
                <div id="selName" style="font-weight:bold; min-height:50px; color:var(--p); font-size:18px;">...</div>
                <div id="calcArea" style="display:none; margin-top:20px; background: #fdfdfd; padding: 15px; border-radius: 8px; border: 1px solid #eee;">
                    <p><span id="t-gross"></span>: <span id="resGross" style="font-weight:bold;">0.00</span> €</p>
                    <p><span id="t-disc"></span>: <span id="resDisc" style="color:var(--s); font-weight:bold;">0% + 0%</span></p>
                    <hr>
                    <div style="font-size:36px; color:var(--s); font-weight:bold; margin:15px 0;" id="selPrice">0.00 €</div>
                    <label id="t-qtyLabel" style="font-size:14px; color:#666;"></label>
                    <input type="number" id="qty" value="1" min="1" oninput="calc()" onkeyup="if(event.key==='Enter') add()">
                    <button class="btn btn-s" id="t-addBtn" onclick="add()"></button>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 id="t-offerTitle"></h3>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-a" style="margin:0; width:auto; padding: 10px 20px;" onclick="exportPDF()">EXPORT PDF</button>
                    <button class="btn btn-p" style="margin:0; width:auto; padding: 10px 20px; background:#34495e;" onclick="exportCSV()">EXCEL</button>
                    <button class="btn" style="margin:0; width:auto; padding: 10px 20px; background:#c0392b;" onclick="clearCart()" id="t-clearAll"></button>
                </div>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th id="th-code"></th><th id="th-desc"></th><th id="th-fam"></th>
                            <th id="th-bruto"></th><th id="th-r1"></th><th id="th-r2"></th>
                            <th id="th-qty"></th><th id="th-total"></th><th></th>
                        </tr>
                    </thead>
                    <tbody id="cart"></tbody>
                </table>
            </div>
            <div class="total-area"><span id="t-grandTotal"></span>: <span id="grand">0.00</span> €</div>
            <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                <label id="t-noteLabel" style="font-size: 13px; font-weight: bold; color: var(--p); display: block;"></label>
                <textarea id="napomena" rows="2"></textarea>
            </div>
        </div>
    </div>

<script>
    const FILES = { clients: 'baza_Clients.csv', discounts: 'baza_Discounts.csv', prices: 'baza_PriceListEUR39.csv' };
    let db = { clients: [], items: [], discounts: {} }, curU = null, selI = null, cart = [], curLang = 'sr';

    const translations = {
        sr: {
            welcome: "B2B Klijentski Portal", loginBtn: "PRIJAVI SE", loggedAs: "Prijavljeni ste kao:", logout: "ODJAVA ✕",
            searchTitle: "Pretraga artikala", searchPh: "Unesite šifru ili opis...", calcTitle: "Obračun cene",
            gross: "Bruto cena", disc: "Vaši rabati", qtyLabel: "Količina (Enter za dodavanje):", addBtn: "DODAJ NA PONUDU",
            offerTitle: "Vaša Ponuda", clearAll: "ISPRAZNI SVE",
            thCode: "Šifra", thDesc: "Opis", thFam: "Fam.", thBruto: "Bruto", thR1: "R1%", thR2: "R2%", thQty: "Kol.", thTotal: "Ukupno",
            grandTotal: "UKUPNO", noteLabel: "NAPOMENA:", selPh: "Odaberite artikal...",
            pdfTitle: "CISA B2B PONUDA", pdfClient: "Klijent", pdfCode: "Kod klijenta", pdfDate: "Datum",
            uCodePh: "Kod klijenta", uPassPh: "Lozinka (Enter)", loginErr: "Pogrešni podaci."
        },
        en: {
            welcome: "B2B Client Portal", loginBtn: "LOGIN", loggedAs: "Logged in as:", logout: "LOGOUT ✕",
            searchTitle: "Product Search", searchPh: "Enter code or description...", calcTitle: "Price Calculation",
            gross: "Gross Price", disc: "Your Discounts", qtyLabel: "Quantity (Enter to add):", addBtn: "ADD TO OFFER",
            offerTitle: "Your Offer", clearAll: "CLEAR ALL",
            thCode: "Code", thDesc: "Description", thFam: "Fam.", thBruto: "Gross", thR1: "D1%", thR2: "D2%", thQty: "Qty", thTotal: "Total",
            grandTotal: "GRAND TOTAL", noteLabel: "NOTES:", selPh: "Select item...",
            pdfTitle: "CISA B2B QUOTATION", pdfClient: "Client", pdfCode: "Client Code", pdfDate: "Date",
            uCodePh: "Client Code", uPassPh: "Password (Enter)", loginErr: "Invalid login."
        },
        it: {
            welcome: "Portale Clienti B2B", loginBtn: "ACCEDI", loggedAs: "Accesso effettuato come:", logout: "LOGOUT ✕",
            searchTitle: "Ricerca Prodotti", searchPh: "Codice o descrizione...", calcTitle: "Calcolo Prezzo",
            gross: "Prezzo Lordo", disc: "I Tuoi Sconti", qtyLabel: "Quantità (Enter):", addBtn: "AGGIUNGI",
            offerTitle: "Tua Offerta", clearAll: "PULISCI TUTTO",
            thCode: "Codice", thDesc: "Descrizione", thFam: "Fam.", thBruto: "Lordo", thR1: "S1%", thR2: "S2%", thQty: "Qtà", thTotal: "Totale",
            grandTotal: "TOTALE", noteLabel: "NOTE:", selPh: "Seleziona articolo...",
            pdfTitle: "CISA B2B PREVENTIVO", pdfClient: "Cliente", pdfCode: "Codice Cliente", pdfDate: "Data",
            uCodePh: "Codice Cliente", uPassPh: "Password (Enter)", loginErr: "Errore login."
        }
    };

    function setLang(l) {
        curLang = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + l).classList.add('active');
        updateUI();
    }

    function updateUI() {
        const t = translations[curLang];
        document.getElementById('t-welcome').innerText = t.welcome;
        document.getElementById('t-loginBtn').innerText = t.loginBtn;
        document.getElementById('t-loggedAs').innerText = t.loggedAs;
        document.getElementById('t-logout').innerText = t.logout;
        document.getElementById('t-searchTitle').innerText = t.searchTitle;
        document.getElementById('search').placeholder = t.searchPh;
        document.getElementById('t-calcTitle').innerText = t.calcTitle;
        if(!selI) document.getElementById('selName').innerText = t.selPh;
        document.getElementById('t-gross').innerText = t.gross;
        document.getElementById('t-disc').innerText = t.disc;
        document.getElementById('t-qtyLabel').innerText = t.qtyLabel;
        document.getElementById('t-addBtn').innerText = t.addBtn;
        document.getElementById('t-offerTitle').innerText = t.offerTitle;
        document.getElementById('t-clearAll').innerText = t.clearAll;
        document.getElementById('th-code').innerText = t.thCode;
        document.getElementById('th-desc').innerText = t.thDesc;
        document.getElementById('th-fam').innerText = t.thFam;
        document.getElementById('th-bruto').innerText = t.thBruto;
        document.getElementById('th-r1').innerText = t.thR1;
        document.getElementById('th-r2').innerText = t.thR2;
        document.getElementById('th-qty').innerText = t.thQty;
        document.getElementById('th-total').innerText = t.thTotal;
        document.getElementById('t-grandTotal').innerText = t.grandTotal;
        document.getElementById('t-noteLabel').innerText = t.noteLabel;
        document.getElementById('uCode').placeholder = t.uCodePh;
        document.getElementById('uPass').placeholder = t.uPassPh;
        document.getElementById('err').innerText = t.loginErr;
    }

    function clearInput() {
        document.getElementById('search').value = '';
        document.getElementById('list').innerHTML = '';
        document.getElementById('clearSearch').style.display = 'none';
        document.getElementById('calcArea').style.display = 'none';
        document.getElementById('selName').innerText = translations[curLang].selPh;
        document.getElementById('qty').value = 1;
        selI = null;
        document.getElementById('search').focus(); // Vrati fokus na pretragu za sledeći kucanje
    }

    function clearCart() { if(confirm("Isprazniti cijelu ponudu?")) { cart = []; renderCart(); } }

    async function init() {
        try {
            const [cR, dR, pR] = await Promise.all([
                fetch(FILES.clients).then(r=>r.text()), 
                fetch(FILES.discounts).then(r=>r.text()), 
                fetch(FILES.prices).then(r=>r.text())
            ]);
            db.clients = Papa.parse(cR, {header:true, skipEmptyLines:true}).data;
            Papa.parse(dR, {header:true, skipEmptyLines:true}).data.forEach(x => {
                db.discounts[`${x.CLIENT_CODE}-${x.FAMILY}`] = { r1: parseFloat(x.BASIC_DISCOUNT)||0, r2: parseFloat(x.DISCOUNT_2)||0 };
            });
            db.items = Papa.parse(pR, {header:true, skipEmptyLines:true}).data;
            document.getElementById('status').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
            updateUI();
        } catch (e) { document.getElementById('status').innerText = "Greška u učitavanju baze!"; }
    }

    function login() {
        const c = document.getElementById('uCode').value.trim(), p = document.getElementById('uPass').value.trim();
        const u = db.clients.find(x => x.CLIENT_CODE == c && x.PASSWORD == p);
        if(u) {
            curU = u; document.getElementById('login-page').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('userDisplay').innerText = `${u.CLIENT_NAME} (${u.CLIENT_CODE})`;
            setTimeout(() => document.getElementById('search').focus(), 100);
        } else { document.getElementById('err').style.display = 'block'; }
    }

    function logout() {
        curU = null; cart = []; renderCart(); selI = null;
        clearInput();
        document.getElementById('uCode').value = ''; document.getElementById('uPass').value = '';
        document.getElementById('app').style.display = 'none'; document.getElementById('login-page').style.display = 'flex';
    }

    function srch() {
        const t = document.getElementById('search').value.toLowerCase();
        document.getElementById('clearSearch').style.display = t.length > 0 ? 'flex' : 'none';
        if(t.length < 2) { document.getElementById('list').innerHTML = ''; return; }
        const f = db.items.filter(x => (x.CODE && x.CODE.toString().toLowerCase().includes(t)) || (x.DESCRIPTION && x.DESCRIPTION.toLowerCase().includes(t))).slice(0, 30);
        document.getElementById('list').innerHTML = f.map(x => `<div class="row" onclick="pick('${x.CODE}')"><strong>${x.CODE}</strong><br><small>${x.DESCRIPTION}</small></div>`).join('');
    }

    function pick(code) {
        selI = db.items.find(x => x.CODE == code);
        document.getElementById('selName').innerText = `${selI.CODE} - ${selI.DESCRIPTION}`;
        document.getElementById('calcArea').style.display = 'block';
        document.getElementById('list').innerHTML = '';
        calc();
        document.getElementById('qty').focus(); // Fokus na količinu odmah
    }

    function calc() {
        let raw = selI['GROSS PRICE'] ? selI['GROSS PRICE'].toString().replace(/[^\d,.]/g, '').replace(',', '.') : "0";
        const g = parseFloat(raw) || 0;
        
        // Tražimo popust u bazi
        let d = db.discounts[`${curU.CLIENT_CODE}-${selI.FAMILY}`];
        
        // AKO NE POSTOJI U BAZI, POSTAVLJAMO DEFAULT 50% + 0%
        if (!d) {
            d = { r1: 50, r2: 0 };
        }

        const n = g * (1 - d.r1/100) * (1 - d.r2/100);
        
        document.getElementById('resGross').innerText = g.toFixed(2);
        document.getElementById('resDisc').innerText = `${d.r1}% + ${d.r2}%`;
        document.getElementById('selPrice').innerText = n.toFixed(2) + " €";
        
        return { neto: n, bruto: g, r1: d.r1, r2: d.r2 };
    }

    function add() {
        if(!selI) return;
        const res = calc(), q = parseInt(document.getElementById('qty').value) || 1;
        cart.push({ 
            code: selI.CODE, desc: selI.DESCRIPTION, family: selI.FAMILY,
            gross: res.bruto, r1: res.r1, r2: res.r2, neto: res.neto,
            qty: q, total: res.neto * q 
        });
        renderCart(); clearInput();
    }

    function updateQty(idx, delta) {
        cart[idx].qty += delta;
        if(cart[idx].qty < 1) cart[idx].qty = 1;
        cart[idx].total = cart[idx].neto * cart[idx].qty;
        renderCart();
    }

    function renderCart() {
        document.getElementById('cart').innerHTML = cart.map((x,i) => `
            <tr>
                <td><strong>${x.code}</strong></td>
                <td><small>${x.desc}</small></td>
                <td>${x.family}</td>
                <td>${x.gross.toFixed(2)} €</td>
                <td>${x.r1}%</td>
                <td>${x.r2}%</td>
                <td>
                    <button class="qty-btn" onclick="updateQty(${i},-1)">-</button>
                    <span style="margin:0 10px; font-weight:bold;">${x.qty}</span>
                    <button class="qty-btn" onclick="updateQty(${i},1)">+</button>
                </td>
                <td><strong>${x.total.toFixed(2)} €</strong></td>
                <td onclick="cart.splice(${i},1);renderCart()" style="color:red;cursor:pointer;">✕</td>
            </tr>`).join('');
        document.getElementById('grand').innerText = cart.reduce((a,b) => a + b.total, 0).toFixed(2);
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape');
        const t = translations[curLang];
        const dateStr = new Date().toLocaleDateString();
        const img = document.getElementById('pdfLogoSource');
        if(img) doc.addImage(img, 'JPEG', 14, 10, 40, 15);
        doc.setFontSize(20); doc.setTextColor(26, 58, 95); doc.text(t.pdfTitle, 14, 35);
        doc.setFontSize(10); doc.setTextColor(50);
        doc.text(`${t.pdfDate}: ${dateStr}`, 14, 45);
        doc.text(`${t.pdfClient}: ${curU.CLIENT_NAME} (${curU.CLIENT_CODE})`, 14, 50);
        doc.autoTable({
            startY: 55,
            head: [[t.thCode, t.thDesc, t.thFam, t.thBruto, t.thR1, t.thR2, t.thQty, t.thTotal]],
            body: cart.map(x => [x.code, x.desc, x.family, x.gross.toFixed(2) + " €", x.r1 + "%", x.r2 + "%", x.qty, x.total.toFixed(2) + " €"]),
            foot: [['', '', '', '', '', '', t.grandTotal + ":", document.getElementById('grand').innerText + " €"]],
            headStyles: { fillColor: [26, 58, 95], fontSize: 9 },
            columnStyles: { 1: { cellWidth: 80 } }
        });
        const nTxt = document.getElementById('napomena').value;
        if(nTxt) {
            doc.text(t.noteLabel, 14, doc.lastAutoTable.finalY + 10);
            doc.text(doc.splitTextToSize(nTxt, 260), 14, doc.lastAutoTable.finalY + 17);
        }
        const pageCount = doc.internal.getNumberOfPages();
        for(let i = 1; i <= pageCount; i++) {
            doc.setPage(i);
            doc.setFontSize(9); doc.setTextColor(100);
            const footerTxt = "Kontakt osoba: Zoran Dragojevic, Agent & Consultant for Balkans ; cisa.zoran.d@gmail.com ; +387 65 363 063";
            const pageWidth = doc.internal.pageSize.width;
            doc.text(footerTxt, (pageWidth/2), doc.internal.pageSize.height - 10, {align: 'center'});
        }
        doc.save(`Ponuda_${curU.CLIENT_CODE}.pdf`);
    }

    function exportCSV() {
        let csv = "\ufeff" + `Client: ${curU.CLIENT_NAME}\nDate: ${new Date().toLocaleDateString()}\n\nCode,Description,Family,Gross,R1,R2,Qty,Total\n`;
        cart.forEach(x => { csv += `"${x.code}","${x.desc}","${x.family}",${x.gross.toFixed(2)},${x.r1},${x.r2},${x.qty},${x.total.toFixed(2)}\n`; });
        const b = new Blob([csv], {type:'text/csv;charset=utf-8;'});
        const l = document.createElement("a"); l.href = URL.createObjectURL(b); l.download = "Ponuda.csv"; l.click();
    }

    window.onload = init;
</script>
</body>
</html>
