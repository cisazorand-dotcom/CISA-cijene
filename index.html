<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CISA B2B Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --p: #1a3a5f; --s: #27ae60; --bg: #f4f7f9; --accent: #e67e22; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; }
        .login-page { height: 100vh; display: flex; align-items: center; justify-content: center; width: 100%; }
        .box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        #app { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; font-size: 16px; transition: 0.3s; color: white; }
        .btn-p { background: var(--p); }
        .btn-s { background: var(--s); }
        .btn-a { background: var(--accent); }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .item-list { height: 400px; overflow-y: auto; border: 1px solid #eee; margin-top: 15px; border-radius: 8px; }
        .row { padding: 15px; border-bottom: 1px solid #f1f1f1; cursor: pointer; text-align: left; }
        .row:hover { background: #f0f7ff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; color: var(--p); text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; }
        .total-area { text-align: right; font-size: 28px; font-weight: bold; color: var(--p); padding: 25px 0; }
        .logo-img { width: 160px; margin-bottom: 20px; }
        .loader { color: #888; font-size: 14px; margin-top: 15px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-page" class="login-page">
        <div class="box">
            <img src="https://www.cisa.com/content/dam/cisa/logos/cisa-logo.png" class="logo-img" alt="CISA Logo">
            <h3 style="color:var(--p); margin-top:0;">B2B Klijentski Portal</h3>
            <div id="status" class="loader">Učitavanje baza podataka...</div>
            <div id="login-form" style="display:none;">
                <input type="text" id="uCode" placeholder="Klijentski kod">
                <input type="password" id="uPass" placeholder="Lozinka">
                <button class="btn btn-p" onclick="login()">PRIJAVI SE</button>
                <p id="err" style="color:red; display:none; margin-top:15px; font-size:14px;">Pogrešni podaci za prijavu.</p>
            </div>
        </div>
    </div>

    <div id="app">
        <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left: 5px solid var(--p);">
            <div>Prijavljeni ste kao: <strong id="userDisplay" style="color:var(--p);"></strong></div>
