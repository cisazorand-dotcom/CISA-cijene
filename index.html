<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>CISA B2B Kalkulator (Excel)</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 900px; }
        .status { font-size: 0.8em; color: #d35400; margin-bottom: 10px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .section { border: 1px solid #eee; padding: 15px; border-radius: 8px; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ddd; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
        .total { font-size: 1.5em; font-weight: bold; color: #1a3a5f; text-align: right; margin-top: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>CISA Portal (Excel Live)</h2>
    <div id="status" class="status">Povezivanje sa Excel bazom...</div>

    <div class="grid">
        <div class="section">
            <label>Klijent:</label>
            <select id="clientList" onchange="calculate()"></select>
            
            <label>Pretraga artikla:</label>
            <input type="text" id="itemSearch" placeholder="Kucaj šifru..." oninput="filterItems()">
            <select id="itemList" size="6" onchange="calculate()"></select>
        </div>

        <div class="section">
            <p>Bruto: <strong id="outGross">0.00</strong> €</p>
            <p>Rabati: <span id="outR1">0</span>% + <span id="outR2">0</span>%</p>
            <label>Količina:</label>
            <input type="number" id="qty" value="1" min="1" oninput="calculate()">
            <h3 style="color: #27ae60;">Neto: <span id="outNet">0.00</span> €</h3>
            <button class="btn-add" onclick="addToCart()">DODAJ NA PONUDU</button>
        </div>
    </div>

    <table id="cartTable">
        <thead>
            <tr><th>Šifra</th><th>Opis</th><th>Kol.</th><th>Neto</th><th>Ukupno</th><th></th></tr>
        </thead>
        <tbody></tbody>
    </table>
    <div class="total">UKUPNO: <span id="cartTotal">0.00</span> €</div>
</div>

<script>
    let dbPrice = [], dbDisc = {}, dbClients = [], cart = [];

    async function loadExcel() {
        try {
            // Putanja do tvog Excel fajla na GitHubu
            const response = await fetch('baza.xlsx');
            const data = await response.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });

            // 1. Čitanje klijenata (Sheet: Clients)
            const clientSheet = workbook.Sheets["Clients"];
            dbClients = XLSX.utils.sheet_to_json(clientSheet);
            document.getElementById('clientList').innerHTML = dbClients.map(c => 
                `<option value="${c.CLIENT_CODE}">${c.CLIENT_NAME}</option>`).join('');

            // 2. Čitanje cjenovnika (Sheet: PriceLIstEUR39)
            const priceSheet = workbook.Sheets["PriceLIstEUR39"];
            dbPrice = XLSX.utils.sheet_to_json(priceSheet);

            // 3. Čitanje rabata (Sheet: Discounts)
            const discSheet = workbook.Sheets["Discounts"];
            const rawDisc = XLSX.utils.sheet_to_json(discSheet);
            rawDisc.forEach(d => {
                dbDisc[`${d.CLIENT_CODE}-${d.FAMILY}`] = { r1: d.BASIC_DISCOUNT, r2: d.DISCOUNT_2 };
            });

            document.getElementById('status').innerText = "✅ Excel baza povezana!";
            document.getElementById('status').style.color = "green";
            filterItems();
        } catch (e) {
            document.getElementById('status').innerText = "❌ Greška pri učitavanju baza.xlsx!";
            console.error(e);
        }
    }

    function filterItems() {
        const term = document.getElementById('itemSearch').value.toLowerCase();
        const filtered = dbPrice.filter(i => 
            (i.CODE && i.CODE.toString().toLowerCase().includes(term)) || 
            (i.DESCRIPTION && i.DESCRIPTION.toString().toLowerCase().includes(term))
        ).slice(0, 20);
        
        document.getElementById('itemList').innerHTML = filtered.map(i => 
            `<option value="${i.CODE}" data-price="${i['GROSS PRICE']}" data-family="${i.FAMILY}" data-desc="${i.DESCRIPTION}">${i.CODE} - ${i.DESCRIPTION}</option>`).join('');
    }

    function calculate() {
        const itemSel = document.getElementById('itemList');
        if (itemSel.selectedIndex === -1) return;
        const opt = itemSel.options[itemSel.selectedIndex];
        const client = document.getElementById('clientList').value;
        const gross = parseFloat(opt.getAttribute('data-price')) || 0;
        const disc = dbDisc[`${client}-${opt.getAttribute('data-family')}`] || { r1: 50, r2: 0 };
        const net = gross * (1 - disc.r1/100) * (1 - disc.r2/100);

        document.getElementById('outGross').innerText = gross.toFixed(2);
        document.getElementById('outR1').innerText = disc.r1;
        document.getElementById('outR2').innerText = disc.r2;
        document.getElementById('outNet').innerText = net.toFixed(2);
        return { code: opt.value, desc: opt.getAttribute('data-desc'), net };
    }

    function addToCart() {
        const res = calculate();
        const qty = parseInt(document.getElementById('qty').value);
        if(!res) return;
        cart.push({ ...res, qty, total: res.net * qty });
        renderCart();
    }

    function renderCart() {
        document.querySelector('#cartTable tbody').innerHTML = cart.map((i, idx) => 
            `<tr><td>${i.code}</td><td>${i.desc}</td><td>${i.qty}</td><td>${i.net.toFixed(2)}</td><td>${i.total.toFixed(2)}</td><td style="cursor:pointer" onclick="cart.splice(${idx},1);renderCart()">❌</td></tr>`).join('');
        document.getElementById('cartTotal').innerText = cart.reduce((s, i) => s + i.total, 0).toFixed(2);
    }

    window.onload = loadExcel;
</script>
</body>
</html>
